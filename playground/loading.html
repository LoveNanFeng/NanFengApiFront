<style data-app-loading="inject-css">
  html {
    line-height: 1.15;
  }

  .loading {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #f4f7f9;
  }

  .loading.hidden {
    visibility: hidden;
    pointer-events: none;
    opacity: 0;
    transition: all 0.8s ease-out;
  }

  .dark .loading {
    background: #0d0d10;
  }

  .title {
    margin-top: 66px;
    font-size: 28px;
    font-weight: 600;
    color: rgb(0 0 0 / 85%);
  }

  .dark .title {
    color: #fff;
  }

  .loader {
    position: relative;
    width: 48px;
    height: 48px;
  }

  .loader::before {
    position: absolute;
    top: 60px;
    left: 0;
    width: 48px;
    height: 5px;
    content: '';
    background: hsl(var(--primary, 210 100% 50%) / 50%);
    border-radius: 50%;
    animation: shadow-ani 0.5s linear infinite;
  }

  .loader::after {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    content: '';
    background: hsl(var(--primary, 210 100% 50%));
    border-radius: 4px;
    animation: jump-ani 0.5s linear infinite;
  }

  @keyframes jump-ani {
    15% {
      border-bottom-right-radius: 3px;
    }

    25% {
      transform: translateY(9px) rotate(22.5deg);
    }

    50% {
      border-bottom-right-radius: 40px;
      transform: translateY(18px) scale(1, 0.9) rotate(45deg);
    }

    75% {
      transform: translateY(9px) rotate(67.5deg);
    }

    100% {
      transform: translateY(0) rotate(90deg);
    }
  }

  @keyframes shadow-ani {
    0%,
    100% {
      transform: scale(1, 1);
    }

    50% {
      transform: scale(1.2, 1);
    }
  }
</style>

<div class="loading" id="__app-loading__">
  <div class="loader"></div>
  <div class="title" id="__app-loading-title__">NanFengAPI</div>
</div>

<script data-app-loading="site-name">
  (function () {
    function clean(value) {
      return String(value || '').trim();
    }

    function setLoadingSiteName(siteName) {
      var name = clean(siteName);
      if (!name) return;

      var title = document.querySelector('#__app-loading-title__');
      if (title) title.textContent = name;
      document.title = name;
    }

    window.__NANFENG_SET_LOADING_SITE_NAME__ = setLoadingSiteName;

    var config = window._VBEN_ADMIN_PRO_APP_CONF_ || {};
    var envApiBase = clean('%VITE_GLOB_API_URL%');
    if (/^%.*%$/.test(envApiBase)) envApiBase = '';
    var apiBase = clean(config.VITE_GLOB_API_URL) || envApiBase || '/api';
    var apiUrl = apiBase.replace(/\/$/, '') + '/site/config';

    fetch(apiUrl, {
      credentials: 'include',
      headers: {
        Accept: 'application/json',
      },
    })
      .then(function (response) {
        return response.ok ? response.json() : null;
      })
      .then(function (payload) {
        setLoadingSiteName(payload && payload.data && payload.data.siteName);
      })
      .catch(function () {});
  })();
</script>
